name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Security audit
        run: bun audit

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build core (required for CLI typecheck)
        run: bun run --filter '@swibostyle/core' build

      - name: Build epub-validator (required for linux-x64 typecheck)
        run: bun run --filter '@swibostyle/epub-validator' build

      - name: Build pdf-server (required for CLI typecheck)
        run: bun run --filter '@swibostyle/pdf-server' build

      - name: Build pdf-renderer (required for CLI typecheck)
        run: bun run --filter '@swibostyle/pdf-renderer' build

      - name: Build CLI (required for create-swibostyle typecheck)
        run: bun run --filter '@swibostyle/cli' build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Build sample EPUB
        working-directory: tests/fixtures/sample-project-ssg
        run: bun ../../../packages/cli/src/index.ts build

      - name: Validate EPUB
        run: bun scripts/validate-epub.ts tests/fixtures/sample-project-ssg/_release/*.epub

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-epub
          path: tests/fixtures/sample-project-ssg/_release/*.epub

      - name: Install Playwright Chromium
        working-directory: packages/pdf-renderer
        run: npx playwright install chromium

      - name: Generate PDF from EPUB
        working-directory: tests/fixtures/sample-project-ssg
        run: bun ../../../packages/cli/src/index.ts pdf ./_release/book-epub.epub -o ./_release/book-epub.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-pdf
          path: tests/fixtures/sample-project-ssg/_release/*.pdf
