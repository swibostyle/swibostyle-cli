name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Security audit
        run: bun audit

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build core (required for CLI typecheck)
        run: bun run --filter '@swibostyle/core' build

      - name: Build epub-validator (required for linux-x64 typecheck)
        run: bun run --filter '@swibostyle/epub-validator' build

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Build sample EPUB
        working-directory: tests/fixtures/sample-project-ssg
        run: bun ../../../packages/cli/src/index.ts build

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-epub
          path: tests/fixtures/sample-project-ssg/_release/*.epub

  validate-epub:
    name: Validate EPUB
    runs-on: ubuntu-latest
    needs: [build]
    env:
      EPUBCHECK_VERSION: "5.1.0"
      EPUBCHECK_SHA256: "74a59af8602bf59b1d04266a450d9cdcb5986e36d825adc403cde0d95e88c9e8"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download EPubCheck
        run: |
          curl -L -o epubcheck.zip \
            "https://github.com/w3c/epubcheck/releases/download/v${EPUBCHECK_VERSION}/epubcheck-${EPUBCHECK_VERSION}.zip"

      - name: Verify checksum
        run: |
          ACTUAL_SHA256=$(sha256sum epubcheck.zip | awk '{print $1}')
          if [ "${ACTUAL_SHA256}" != "${EPUBCHECK_SHA256}" ]; then
            echo "ERROR: Checksum mismatch!"
            echo "Expected: ${EPUBCHECK_SHA256}"
            echo "Actual:   ${ACTUAL_SHA256}"
            exit 1
          fi
          echo "Checksum verified"

      - name: Extract EPubCheck
        run: unzip epubcheck.zip

      - name: Download EPUB artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-epub
          path: test-epub/

      - name: Validate EPUB with EPubCheck
        run: |
          echo "Validating EPUB files..."
          for epub in test-epub/*.epub; do
            echo "Validating: $epub"
            java -jar "epubcheck-${EPUBCHECK_VERSION}/epubcheck.jar" "$epub" --json - | head -100
          done
