name: Build EPubCheck Binaries

on:
  workflow_dispatch:
    inputs:
      epubcheck_version:
        description: 'EPubCheck version (leave empty to use epubcheck.json)'
        required: false
      epubcheck_sha256:
        description: 'EPubCheck SHA256 checksum (leave empty to use epubcheck.json)'
        required: false
  push:
    paths:
      - 'packages/epub-validator-linux-x64/**'
      - '.github/workflows/build-epubcheck.yml'
    branches:
      - main

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: bun install

      - name: Build JRE with jlink
        run: bun run --filter '@swibostyle/epub-validator-linux-x64' build:jre
        env:
          EPUBCHECK_VERSION: ${{ github.event.inputs.epubcheck_version }}
          EPUBCHECK_SHA256: ${{ github.event.inputs.epubcheck_sha256 }}

      - name: Build TypeScript
        run: bun run --filter '@swibostyle/epub-validator-linux-x64' build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub-validator-linux-x64
          path: |
            packages/epub-validator-linux-x64/dist/
            packages/epub-validator-linux-x64/jre/
            packages/epub-validator-linux-x64/epubcheck.jar
            packages/epub-validator-linux-x64/lib/
            packages/epub-validator-linux-x64/VERSION
            packages/epub-validator-linux-x64/CHECKSUM
            packages/epub-validator-linux-x64/package.json
