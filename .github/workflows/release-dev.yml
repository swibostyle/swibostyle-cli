name: Dev Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            artifact: swibostyle-linux-x64
          - target: linux-arm64
            os: ubuntu-latest
            artifact: swibostyle-linux-arm64
          - target: darwin-x64
            os: macos-latest
            artifact: swibostyle-darwin-x64
          - target: darwin-arm64
            os: macos-latest
            artifact: swibostyle-darwin-arm64
          - target: windows-x64
            os: windows-latest
            artifact: swibostyle-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Compile binary
        run: bun build --compile --target=bun-${{ matrix.target }} ./packages/cli/src/index.ts --outfile ./dist/${{ matrix.artifact }} --external sharp --external psd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./dist/${{ matrix.artifact }}

  release:
    name: Update Dev Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Move all binaries to release folder
          find ./artifacts -type f -name 'swibostyle*' -exec mv {} ./release/ \;
          # Make Linux/macOS binaries executable
          chmod +x ./release/swibostyle-linux-* ./release/swibostyle-darwin-* 2>/dev/null || true
          ls -la ./release/

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true

      - name: Create dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create dev ./release/* \
            --title "Development Build" \
            --notes "Latest development build from main branch.

          **Note**: This is an unstable pre-release build. Use at your own risk.

          ## Installation

          Download the binary for your platform and make it executable:

          \`\`\`bash
          # Linux x64
          curl -L https://github.com/${{ github.repository }}/releases/download/dev/swibostyle-linux-x64 -o swibostyle
          chmod +x swibostyle

          # macOS Apple Silicon
          curl -L https://github.com/${{ github.repository }}/releases/download/dev/swibostyle-darwin-arm64 -o swibostyle
          chmod +x swibostyle

          # macOS Intel
          curl -L https://github.com/${{ github.repository }}/releases/download/dev/swibostyle-darwin-x64 -o swibostyle
          chmod +x swibostyle
          \`\`\`

          Then run:
          \`\`\`bash
          ./swibostyle --help
          \`\`\`

          Built from commit: ${{ github.sha }}" \
            --prerelease
